<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Calculator – Desisavar</title>

<style>
body{
  margin:0;
  font-family:Inter,system-ui;
  background:#f4f6ff;
}
.header{
  background:#3248f5;
  color:#fff;
  padding:14px;
  text-align:center;
  font-size:18px;
  font-weight:600;
}
.container{
  max-width:420px;
  margin:16px auto;
  background:#fff;
  border-radius:18px;
  padding:20px;
}
h2{
  text-align:center;
  color:#3248f5;
}
.box{margin-bottom:22px}
.label{
  display:flex;
  justify-content:space-between;
  font-weight:600;
  margin-bottom:6px;
}
.value{color:#16a34a}
input[type=range]{width:100%}

.chart-wrap{
  position:relative;
  width:240px;
  height:240px;
  margin:20px auto;
}
canvas{
  width:240px;
  height:240px;
}
.center-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}
.center-text small{
  color:#666;
  font-size:13px;
}
.center-text strong{
  font-size:20px;
  color:#111;
}

.legend{
  display:flex;
  justify-content:space-around;
  font-size:14px;
}
.dot{
  width:12px;
  height:12px;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
}

.result{
  background:#eef2ff;
  padding:16px;
  border-radius:14px;
  margin-top:20px;
}
.result div{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}
.total{
  font-weight:700;
  font-size:18px;
}

.footer{
  text-align:center;
  font-size:13px;
  margin-top:14px;
  color:#555;
}
</style>
</head>

<body>

<div class="header">Desisavar EMI Calculator</div>

<div class="container">
<h2>Calculate Loan EMI</h2>

<!-- Loan Amount -->
<div class="box">
  <div class="label">
    <span>Loan Amount</span>
    <span class="value">₹ <span id="loanVal">500000</span></span>
  </div>
  <input type="range" min="50000" max="5000000" step="50000" value="500000" id="loan">
</div>

<!-- Interest -->
<div class="box">
  <div class="label">
    <span>Interest Rate (p.a)</span>
    <span class="value"><span id="rateVal">9</span>%</span>
  </div>
  <input type="range" min="5" max="20" step="0.1" value="9" id="rate">
</div>

<!-- Tenure -->
<div class="box">
  <div class="label">
    <span>Loan Tenure</span>
    <span class="value"><span id="timeVal">10</span> Yr</span>
  </div>
  <input type="range" min="1" max="30" value="10" id="time">
</div>

<!-- Donut -->
<div class="chart-wrap">
  <canvas id="donut"></canvas>
  <div class="center-text">
    <small>Monthly EMI</small><br>
    <strong>₹ <span id="centerEmi">0</span></strong>
  </div>
</div>

<div class="legend">
  <div><span class="dot" style="background:#c7d2fe"></span>Principal</div>
  <div><span class="dot" style="background:#4f46e5"></span>Interest</div>
</div>

<!-- Result -->
<div class="result">
  <div><span>Monthly EMI</span><span>₹ <span id="emi">0</span></span></div>
  <div><span>Total Interest</span><span>₹ <span id="interest">0</span></span></div>
  <div class="total"><span>Total Amount</span><span>₹ <span id="total">0</span></span></div>
</div>

<div class="footer">Powered by <strong>desisavar.pages.dev</strong></div>
</div>

<script>
const loan = document.getElementById("loan");
const rate = document.getElementById("rate");
const time = document.getElementById("time");
const canvas = document.getElementById("donut");
const ctx = canvas.getContext("2d");

canvas.width = canvas.height = 240;
let currentAngle = 0;

function easeOut(t){ return 1 - Math.pow(1-t,3); }

function animateDonut(targetAngle){
  let start = currentAngle;
  let startTime = null;

  function animate(ts){
    if(!startTime) startTime = ts;
    let p = Math.min((ts-startTime)/600,1);
    let angle = start + (targetAngle-start)*easeOut(p);
    draw(angle);
    if(p<1) requestAnimationFrame(animate);
    else currentAngle = targetAngle;
  }
  requestAnimationFrame(animate);
}

function draw(angle){
  ctx.clearRect(0,0,240,240);
  const c=120, r=90, s=-0.5*Math.PI;

  ctx.lineWidth=22;
  ctx.strokeStyle="#e5e7eb";
  ctx.beginPath();
  ctx.arc(c,c,r,0,2*Math.PI);
  ctx.stroke();

  ctx.strokeStyle="#c7d2fe";
  ctx.beginPath();
  ctx.arc(c,c,r,s,s+angle);
  ctx.stroke();

  ctx.strokeStyle="#4f46e5";
  ctx.beginPath();
  ctx.arc(c,c,r,s+angle,s+2*Math.PI);
  ctx.stroke();
}

function calculateEMI(){
  let P = +loan.value;
  let r = (+rate.value/100)/12;
  let n = +time.value*12;

  let emi = (P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  let total = emi*n;
  let interest = total-P;

  loanVal.innerText=P.toLocaleString();
  rateVal.innerText=rate.value;
  timeVal.innerText=time.value;

  emi=Math.round(emi);
  interest=Math.round(interest);
  total=Math.round(total);

  document.getElementById("emi").innerText=emi.toLocaleString();
  document.getElementById("interest").innerText=interest.toLocaleString();
  document.getElementById("total").innerText=total.toLocaleString();
  document.getElementById("centerEmi").innerText=emi.toLocaleString();

  let angle=(P/total)*2*Math.PI;
  animateDonut(angle);
}

loan.oninput = rate.oninput = time.oninput = calculateEMI;
calculateEMI();
</script>

</body>
  </html>
